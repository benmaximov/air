[platformio]
src_dir = .

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
build_src_filter = +<app.cpp> +<vfd.cpp> +<scd4x_reader.cpp> +<zc13_reader.cpp> +<sc05_reader.cpp> +<mq7_heater.cpp> -<src/*>

; Force 16MB Flash Size and correct PSRAM (qio_opi) settings
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi

; Match Arduino IDE routing: Serial -> UART0 (COM3), Programming -> JTAG (COM10)
build_flags = 
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=0

upload_port = COM10
monitor_port = COM3
monitor_speed = 115200
upload_speed = 921600

lib_deps =
  dfrobot/DFRobot_SCD4X @ ^1.0.1

